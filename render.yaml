services:
  - type: web
    name: medibot-telegram
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PORT
        value: 3000
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: medibot-telegram
          property: host
